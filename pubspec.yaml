name: automated_attendance_system
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  mobile_scanner: ^5.1.1
  cupertino_icons: ^1.0.8

  # firebase dependencies
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "lib/assets/appIcon.png"
  adaptive_icon_background: "#FFFFFF" # Optional: provides a white background for adaptive icons
  adaptive_icon_foreground: "lib/assets/appIcon.png"



flutter:
  uses-material-design: true

